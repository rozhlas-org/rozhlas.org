name: rozhlas

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  ipfs:
    image: ipfs/kubo:latest
    restart: unless-stopped
    # 4001 = swarm (p2p), 5001 = RPC API (internal only), 8080 = gateway
    ports:
      - "4001:4001"
      - "127.0.0.1:8080:8080"
    volumes:
      - ipfs-data:/data/ipfs
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Local LLM for omnisearch intent parsing (no API cost). CPU-only is fine for a
  # small model. The model is pulled once by the `ollama-pull` one-shot below.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 5

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "qwen2.5:3b"]
    restart: "no"

  web:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      IPFS_API_URL: http://ipfs:5001
      IPFS_GATEWAY_URL: http://ipfs:8080
      INTENT_PROVIDER: ollama
      OLLAMA_URL: http://ollama:11434
      DATABASE_PATH: /data/rozhlas.db
    ports:
      - "3000:3000"
    volumes:
      - app-data:/data
    healthcheck:
      test:
        ["CMD", "bun", "-e", "process.exit((await fetch('http://localhost:3000/healthz').then(r=>r.ok).catch(()=>false))?0:1)"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      redis:
        condition: service_healthy
      ipfs:
        condition: service_started
      ollama:
        condition: service_started # intent falls back to heuristic until model is pulled

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      IPFS_API_URL: http://ipfs:5001
      IPFS_GATEWAY_URL: http://ipfs:8080
      DATABASE_PATH: /data/rozhlas.db
    volumes:
      - app-data:/data
    depends_on:
      redis:
        condition: service_healthy
      ipfs:
        condition: service_started
      web:
        condition: service_healthy # web applies migrations before going healthy

volumes:
  redis-data:
  ipfs-data:
  app-data:
  ollama-data:
