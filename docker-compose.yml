name: rozhlas

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  ipfs:
    # Pinned to match the existing repo version (v16); bind-mounts the existing
    # node so pins + identity are preserved. Runs as root to read /root/.ipfs.
    image: ipfs/kubo:v0.32.1
    user: "0:0"
    restart: unless-stopped
    # 4001 = swarm (p2p), 5001 = RPC API (compose-internal only), 8080 = gateway
    ports:
      - "4001:4001"
      - "4001:4001/udp"
      - "127.0.0.1:8080:8080"
    volumes:
      - /root/.ipfs:/data/ipfs
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      IPFS_API_URL: http://ipfs:5001
      # PUBLIC gateway — the API hands these URLs to browsers.
      IPFS_GATEWAY_URL: https://ipfs.rozhlas.org
      # Omnisearch intent defaults to "heuristic" (no LLM) — small local models
      # mangle Czech; Voyage's multilingual embeddings carry the semantic search.
      # Set INTENT_PROVIDER=claude + ANTHROPIC_API_KEY to enable Haiku rewriting.
      DATABASE_PATH: /data/rozhlas.db
    ports:
      # Bind to loopback only — public access goes through Caddy (443).
      # Defense-in-depth behind the Hetzner firewall; keeps :3000 off public interfaces.
      - "127.0.0.1:3000:3000"
    volumes:
      - ./data:/data
    healthcheck:
      test:
        ["CMD", "bun", "-e", "process.exit((await fetch('http://localhost:3000/healthz').then(r=>r.ok).catch(()=>false))?0:1)"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      redis:
        condition: service_healthy
      ipfs:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      IPFS_API_URL: http://ipfs:5001
      # INTERNAL gateway — verify streamability against the local node (no proxy needed).
      IPFS_GATEWAY_URL: http://ipfs:8080
      DATABASE_PATH: /data/rozhlas.db
      # Stage audio on the persistent ./data mount, NOT the container's ephemeral
      # /tmp. A worker restart between acquire-audio and ipfs-add must not orphan
      # the staged file (otherwise ipfs-add fails ENOENT). Cleared after each pin.
      AUDIO_STAGING_DIR: /data/staging
      # Transcription (faster-whisper). Steady-state only: new shows are
      # transcribed as they arrive; the ~13k backlog stays parked unless
      # TRANSCRIBE_BACKFILL=true (that's the off-box GPU/Groq job).
      # Local CPU whisper DISABLED: large-v3 on this 4-core box pegs ~4 cores per
      # file, starving the worker event loop so BullMQ can't renew job locks
      # (cascading "Missing lock"/stalled failures across all queues). Transcription
      # is handled off-box: Groq steady-state (newest arrivals) + GPU backfill.
      # Re-enable only with a hard concurrency cap if ever needed.
      # WHISPER_PYTHON: /opt/whisper-venv/bin/python
      WHISPER_MODEL: large-v3
      WHISPER_THREADS: "4"
      # large-v3 (~3GB) caches here on first use — a bind on the big /home volume.
      HF_HOME: /models
    volumes:
      - ./data:/data
      - /home/whisper-models:/models
    depends_on:
      redis:
        condition: service_healthy
      ipfs:
        condition: service_started
      web:
        condition: service_healthy # web applies migrations before going healthy

volumes:
  redis-data:
  # ipfs repo and app data are host bind-mounts (/root/.ipfs, ./data) to reuse
  # the existing pinned node and SQLite DB.
