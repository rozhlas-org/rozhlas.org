name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "packages/web/**"
      - "bun.lock"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages, and use OIDC for the deploy step.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish (don't cancel a live deploy).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build static site
        run: bun run --cwd packages/web build
        env:
          # Production API origin the frontend calls at runtime.
          PUBLIC_API_BASE: https://api.rozhlas.org
          # Playback gate: SHA-256 of the unlock password (here: "123456"). Baked into the
          # bundle → the public site hides all playback until unlocked at /auth. Not a secret
          # (the hash ships in the JS; only the password is). Empty/unset → gate off.
          PUBLIC_AUTH_HASH: 8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
